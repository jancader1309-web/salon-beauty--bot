<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Factory — Chat Bubble Demo</title>
<style>
  body {
    margin: 0; padding: 0;
    background: #f0ebe8;
    min-height: 100vh;
    font-family: sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .demo-page {
    text-align: center; color: #888; font-size: 14px;
  }
  .demo-page h2 { color: #1a1a1a; font-weight: 400; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="demo-page">
  <h2>Beauty Factory</h2>
  <p>Kliknij ikonkę czatu w prawym dolnym rogu →</p>
</div>

<!-- ============================================================
     BEAUTY FACTORY CHAT BUBBLE — WKLEJ TO NA KONIEC STRONY
     ============================================================ -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

#bf-bubble-btn {
  position: fixed; bottom: 24px; right: 24px; z-index: 9998;
  width: 58px; height: 58px; border-radius: 50%;
  background: #1a1a1a; border: none; cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
#bf-bubble-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,0,0,0.32); }

#bf-bubble-badge {
  position: absolute; top: -2px; right: -2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #c9a0a0; border: 2px solid #f0ebe8;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #fff; font-weight: 600;
}

#bf-chat-window {
  position: fixed; bottom: 96px; right: 24px; z-index: 9999;
  width: 370px; height: 560px;
  background: #fff;
  border: 1px solid #e8e0e0;
  border-radius: 20px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.18);
  display: flex; flex-direction: column;
  overflow: hidden;
  transform: scale(0.92) translateY(16px);
  opacity: 0; pointer-events: none;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
  font-family: 'DM Sans', sans-serif;
}
#bf-chat-window.open {
  transform: scale(1) translateY(0);
  opacity: 1; pointer-events: all;
}

#bf-header {
  background: #1a1a1a; padding: 16px 18px;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
#bf-logo-circle {
  width: 36px; height: 36px; border-radius: 50%;
  background: #c9a0a0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 500; color: #1a1a1a; flex-shrink: 0;
}
#bf-header-text { flex: 1; }
#bf-header-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 400; color: #fff; letter-spacing: 0.02em;
}
#bf-header-status { font-size: 11px; color: #c9a0a0; font-weight: 300; letter-spacing: 0.04em; }
#bf-online-dot { width: 7px; height: 7px; border-radius: 50%; background: #7ecb94; }
#bf-close-btn {
  background: none; border: none; cursor: pointer;
  color: #888; font-size: 20px; line-height: 1; padding: 0 0 0 8px;
  transition: color 0.15s;
}
#bf-close-btn:hover { color: #fff; }

#bf-messages {
  flex: 1; overflow-y: auto;
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 10px;
}
#bf-messages::-webkit-scrollbar { width: 3px; }
#bf-messages::-webkit-scrollbar-thumb { background: rgba(201,160,160,0.3); border-radius: 2px; }

.bf-msg { display: flex; flex-direction: column; max-width: 84%; animation: bfUp 0.22s ease; }
@keyframes bfUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.bf-msg.bot { align-self: flex-start; }
.bf-msg.user { align-self: flex-end; }
.bf-bubble { padding: 9px 13px; border-radius: 15px; font-size: 13px; line-height: 1.55; }
.bf-msg.bot .bf-bubble {
  background: #f7f3f3; color: #1a1a1a;
  border: 1px solid #ede5e5; border-bottom-left-radius: 3px;
}
.bf-msg.user .bf-bubble { background: #1a1a1a; color: #fff; border-bottom-right-radius: 3px; }
.bf-time { font-size: 10px; color: #bbb; margin-top: 3px; padding: 0 3px; }
.bf-msg.user .bf-time { text-align: right; }

#bf-quick-btns { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 14px 8px; flex-shrink: 0; }
.bf-qbtn {
  font-family: 'DM Sans', sans-serif; font-size: 11.5px;
  padding: 5px 11px; border-radius: 20px;
  border: 1px solid #c9a0a0; background: transparent;
  color: #a07070; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.bf-qbtn:hover { background: #f0e4e4; }

#bf-input-area {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-top: 1px solid #ede5e5;
  background: #fff; flex-shrink: 0;
}
#bf-input {
  flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 9px 13px; border-radius: 20px;
  border: 1px solid #e0d8d8; background: #faf8f7;
  color: #1a1a1a; outline: none; transition: border-color 0.15s;
}
#bf-input:focus { border-color: #c9a0a0; }
#bf-input::placeholder { color: #bbb; }
#bf-send {
  width: 34px; height: 34px; border-radius: 50%;
  border: none; background: #1a1a1a; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s;
}
#bf-send:hover { background: #333; }
#bf-send:disabled { background: #ccc; cursor: default; }

.bf-typing {
  display: flex; align-items: center; gap: 4px;
  padding: 9px 13px; background: #f7f3f3;
  border: 1px solid #ede5e5; border-radius: 15px; border-bottom-left-radius: 3px;
  width: fit-content;
}
.bf-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #c9a0a0; animation: bfBounce 1.2s infinite;
}
.bf-dot:nth-child(2) { animation-delay: 0.2s; }
.bf-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bfBounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

@media (max-width: 440px) {
  #bf-chat-window { width: calc(100vw - 24px); right: 12px; bottom: 88px; }
  #bf-bubble-btn { right: 16px; bottom: 16px; }
}
</style>

<!-- Przycisk bubble -->
<button id="bf-bubble-btn" onclick="bfToggle()" title="Porozmawiaj z asystentką">
  <div id="bf-bubble-badge">1</div>
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
    <path d="M13 2C7.477 2 3 6.03 3 11c0 2.56 1.12 4.87 2.94 6.52L5 22l4.82-2.1C10.5 20.28 11.73 20.5 13 20.5c5.523 0 10-4.03 10-9s-4.477-9-10-9z" fill="#c9a0a0"/>
    <circle cx="9" cy="11" r="1.3" fill="#1a1a1a"/>
    <circle cx="13" cy="11" r="1.3" fill="#1a1a1a"/>
    <circle cx="17" cy="11" r="1.3" fill="#1a1a1a"/>
  </svg>
</button>

<!-- Okno czatu -->
<div id="bf-chat-window">
  <div id="bf-header">
    <div id="bf-logo-circle">BF</div>
    <div id="bf-header-text">
      <div id="bf-header-name">Beauty Factory</div>
      <div id="bf-header-status">asystentka online</div>
    </div>
    <div id="bf-online-dot"></div>
    <button id="bf-close-btn" onclick="bfToggle()">✕</button>
  </div>

  <div id="bf-messages">
    <div class="bf-msg bot">
      <div class="bf-bubble">Witaj w <strong>Beauty Factory</strong> ✨<br><br>Jestem Twoją wirtualną asystentką. Chętnie opowiem o zabiegach, cenach lub pomogę umówić wizytę.<br><br>W czym mogę Ci pomóc?</div>
      <div class="bf-time">teraz</div>
    </div>
  </div>

  <div id="bf-quick-btns">
    <button class="bf-qbtn" onclick="bfSendQuick('Jakie zabiegi oferujecie?')">zabiegi</button>
    <button class="bf-qbtn" onclick="bfSendQuick('Ile kosztuje depilacja laserowa?')">cennik</button>
    <button class="bf-qbtn" onclick="bfSendQuick('Kiedy jesteście otwarci?')">godziny</button>
    <button class="bf-qbtn" onclick="bfSendQuick('Chcę umówić wizytę')">rezerwacja</button>
  </div>

  <div id="bf-input-area">
    <input id="bf-input" type="text" placeholder="Napisz wiadomość..." maxlength="300" />
    <button id="bf-send" onclick="bfSendMsg()">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M14 8L2 2l2 6-2 6 12-6z" fill="white"/>
      </svg>
    </button>
  </div>
</div>

<script>
const BF_BACKEND = "https://salon-beauty-bot-oios.onrender.com";
const bfHistory = [];
let bfOpen = false;

function bfToggle() {
  bfOpen = !bfOpen;
  document.getElementById('bf-chat-window').classList.toggle('open', bfOpen);
  if (bfOpen) {
    document.getElementById('bf-bubble-badge').style.display = 'none';
    setTimeout(() => document.getElementById('bf-input').focus(), 300);
  }
}

function bfGetTime() {
  return new Date().toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
}

function bfAddMsg(text, role) {
  const msgs = document.getElementById('bf-messages');
  const div = document.createElement('div');
  div.className = `bf-msg ${role}`;
  const safe = text.replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  div.innerHTML = `<div class="bf-bubble">${safe}</div><div class="bf-time">${bfGetTime()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function bfShowTyping() {
  const msgs = document.getElementById('bf-messages');
  const div = document.createElement('div');
  div.className = 'bf-msg bot'; div.id = 'bf-typing';
  div.innerHTML = `<div class="bf-typing"><div class="bf-dot"></div><div class="bf-dot"></div><div class="bf-dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function bfRemoveTyping() {
  const t = document.getElementById('bf-typing');
  if (t) t.remove();
}

function bfSetLoading(val) {
  document.getElementById('bf-send').disabled = val;
  document.getElementById('bf-input').disabled = val;
}

async function bfCall(userText) {
  bfHistory.push({ role: 'user', content: userText });
  bfShowTyping();
  bfSetLoading(true);
  try {
    const res = await fetch(`${BF_BACKEND}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: bfHistory })
    });
    const data = await res.json();
    const reply = data.reply || 'Przepraszam, coś poszło nie tak.';
    bfHistory.push({ role: 'assistant', content: reply });
    bfRemoveTyping();
    bfAddMsg(reply, 'bot');
  } catch(e) {
    bfRemoveTyping();
    bfAddMsg('Przepraszam, błąd połączenia. Zadzwoń: 664 852 791 📞', 'bot');
  }
  bfSetLoading(false);
}

function bfSendQuick(text) {
  bfAddMsg(text, 'user');
  document.getElementById('bf-quick-btns').style.display = 'none';
  bfCall(text);
}

function bfSendMsg() {
  const input = document.getElementById('bf-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  bfAddMsg(text, 'user');
  document.getElementById('bf-quick-btns').style.display = 'none';
  bfCall(text);
}

document.getElementById('bf-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) bfSendMsg();
});
</script>
<!-- ============================================================
     KONIEC BEAUTY FACTORY CHAT BUBBLE
     ============================================================ -->

</body>
</html>
